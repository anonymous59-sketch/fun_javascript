    <div id="result"></div>

    <script>
      init();

      function init() {
        $.ajax("https://jsonplaceholder.typicode.com/todos/1").then((resp) => {
          console.log(resp);
          let { userId, id, title, completed } = resp;

          $("#result")
            .append("<div>")
            // .html(JSON.stringify(resp));
            .html(`${userId}, ${id}, ${title}, ${completed}`);
        });
      }

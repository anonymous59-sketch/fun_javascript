<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Number guessing game</title>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <style>
      html {
        font-family: sans-serif;
      }
      body {
        width: 50%;
        max-width: 800px;
        min-width: 480px;
        margin: 0 auto;
      }
      .form input[type="number"] {
        width: 200px;
      }
      .lastResult {
        color: white;
        padding: 3px;
      }
    </style>
  </head>

  <body>
    <h1>Number guessing game</h1>

    <p>
      We have selected a random number between 1 and 100. See if you can guess
      it in 10 turns or fewer. We'll tell you if your guess was too high or too
      low.
    </p>

    <div class="form">
      <label for="guessField">Enter a guess: </label>
      <input
        type="number"
        min="1"
        max="100"
        required
        id="guessField"
        class="guessField"
      />
      <input type="submit" value="Submit guess" class="guessSubmit" />
    </div>

    <div class="resultParas">
      <p class="guesses"></p>
      <p class="lastResult"></p>
      <p class="lowOrHi"></p>
    </div>

    <script>
      init();

      function init() {
        let randomNumber = Math.floor(Math.random() * 100) + 1;
        const guesses = $(".guesses");
        const lastResult = $(".lastResult");
        const lowOrHi = $(".lowOrHi");
        const guessSubmit = $(".guessSubmit");
        const guessField = $(".guessField");
        let guessCount = 1;
        let resetButton;

        function checkGuess() {
          const userGuess = Number(guessField.val());
          if (guessCount === 1) {
            guesses.html("Previous guesses: ");
          }

          guesses.html(`${guesses.html()} ${userGuess}`);

          if (userGuess === randomNumber) {
            lastResult.html("Congratulations! You got it right!");
            lastResult.css("backgroundColor", "green");
            lowOrHi.html("");
            setGameOver();
          } else if (guessCount === 10) {
            lastResult.html("!!!GAME OVER!!!");
            lowOrHi.html("");
            setGameOver();
          } else {
            lastResult.html("Wrong!");
            lastResult.css("background", "red");
            if (userGuess < randomNumber) {
              lowOrHi.html("Last guess was too low!");
            } else if (userGuess > randomNumber) {
              lowOrHi.html("Last guess was too high!");
            }
          }

          guessCount++;
          guessField.val("");
          guessField.focus();
        }

        guessSubmit.on("click", checkGuess);

        function setGameOver() {
          guessField.attr("disabled", true);
          guessSubmit.attr("disabled", true);
          resetButton = $("<button>");
          resetButton.html("Start new game");
          $(document.body).append(resetButton);
          // $(document.body).append($("<button>").html("Start new game"));
          resetButton.on("click", resetGame);
        }

        function resetGame() {
          guessCount = 1;
          $(".resultParas p").html("");

          resetButton.remove();
          guessField.attr("disabled", false);
          guessSubmit.attr("disabled", false);
          guessField.val("");
          guessField.focus();
          lastResult.css("backgroundColor", "white");
          randomNumber = Math.floor(Math.random() * 100) + 1;
        }
      }
    </script>
  </body>
</html>

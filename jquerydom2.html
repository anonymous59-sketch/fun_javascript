<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>test</title>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="container">
      <input type="text" id="num1" value="10"/>
      <input type="text" id="num2" value="20"/>
      <button type="button" id="btn">계산</button>

      <div id="result">

      </div>
      
    </div>
    
  </body>

  <script>
    $("#btn").on("click", () => {
      let sum = Number($("#num1").val()) + Number($("#num2").val());
      // $("#result").html(sum);
      $("#result").append($("<div>").html(sum));
      $("#num1").val("");
      $("#num2").val("");
      $("#num1").focus();
    });
  </script>
</html>

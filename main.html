<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <button>1</button>
    <button>2</button>
    <div id="result"></div>

    <script>
      $("button").on("click", e => {
        let pageName = $(e.target).html() == "1" ? "jquerydom.html" : "jquerydom3.html";
        $("#result").load(pageName);
      })
    </script>
  </body>
</html>
